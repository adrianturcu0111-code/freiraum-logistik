<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FreiRaum Logistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md p-3">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html"><img src="Logo Freiraum.jpeg" class="h-12"></a>
            <div class="space-x-4">
                <a href="index.html" class="text-blue-900">Home</a>
                <a href="contact.html" class="font-bold text-blue-600">Contact</a>
                <button onclick="setLanguage('de')">DE</button>
                <button onclick="setLanguage('en')">EN</button>
            </div>
        </div>
    </nav>

    <section class="py-16 container mx-auto px-6">
        <h1 class="text-4xl font-bold text-blue-900 mb-10" data-key="title">Kontaktieren Sie uns</h1>
        
        <div class="grid md:grid-cols-2 gap-12">
            <div class="bg-white p-8 shadow rounded-lg">
                <h2 class="text-xl font-bold mb-6" data-key="info-h">Firmendaten</h2>
                <p class="mb-4"><strong>FreiRaum Logistik GmbH</strong></p>
                <p class="mb-2"><i class="fas fa-map-marker-alt mr-2 text-blue-600"></i> Musterstraße 123, 12345 Mainz, Germany</p>
                <p class="mb-2"><i class="fas fa-phone mr-2 text-blue-600"></i> +49 123 456 789</p>
                <p class="mb-2"><i class="fas fa-envelope mr-2 text-blue-600"></i> info@freiraum-logistik.de</p>
            </div>
            <div class="h-64 bg-gray-300 rounded-lg flex items-center justify-center text-gray-500">
                [Google Maps Integration Placeholder]
            </div>
        </div>
    </section>

    <script>
        const translations = {
            'de': { 'title': 'Kontaktieren Sie uns', 'info-h': 'Firmendaten' },
            'en': { 'title': 'Contact Us', 'info-h': 'Company Details' }
        };
        function setLanguage(lang) {
            document.querySelectorAll('[data-key]').forEach(elem => {
                elem.innerText = translations[lang][elem.getAttribute('data-key')];
            });
        }
    </script>
</body>
</html>
