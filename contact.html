<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FreiRaum Logistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="index.html">
            <img src="Logo_Freiraum.jpg" alt="Logo" class="h-10 md:h-16">
        </a>
        
        <div class="hidden md:flex space-x-6 font-semibold text-blue-900 uppercase text-sm">
            <a href="index.html" class="hover:text-blue-600" data-key="nav-home">Home</a>
            <a href="transport.html" class="hover:text-blue-600" data-key="nav-transport">Transport</a>
            <a href="offerte.html" class="hover:text-blue-600" data-key="nav-quote">Offerte</a>
            <a href="contact.html" class="hover:text-blue-600" data-key="nav-contact">Contact</a>
        </div>

        <div class="flex items-center space-x-3">
            <div class="text-xs font-bold border rounded px-2 py-1 flex space-x-2 bg-gray-100">
                <button onclick="setLanguage('de')" class="hover:text-blue-600">DE</button>
                <span class="text-gray-400">|</span>
                <button onclick="setLanguage('en')" class="hover:text-blue-600">EN</button>
            </div>
            
            <button onclick="toggleMobileMenu()" class="md:hidden text-blue-900 p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </div>

    <div id="mobile-menu" class="hidden bg-blue-900 text-white flex flex-col p-4 space-y-4 md:hidden">
        <a href="index.html" class="border-b border-blue-800 pb-2" data-key="nav-home">Home</a>
        <a href="transport.html" class="border-b border-blue-800 pb-2" data-key="nav-transport">Transport</a>
        <a href="offerte.html" class="border-b border-blue-800 pb-2" data-key="nav-quote">Offerte</a>
        <a href="contact.html" class="pb-2" data-key="nav-contact">Contact</a>
    </div>
</nav>

    <div class="container mx-auto py-16 px-6">
        <div class="grid md:grid-cols-2 gap-16">
            <div>
                <h1 class="text-4xl font-bold text-blue-900 mb-6" data-key="title">Kontakt</h1>
                <p class="text-gray-600 mb-8" data-key="subtitle">Haben Sie Fragen? Wir sind rund um die Uhr für Sie da.</p>
                
                <div class="space-y-6">
                    <div class="flex items-start">
                        <div class="bg-blue-100 p-3 rounded-full mr-4 text-blue-600"><i class="fas fa-map-marker-alt"></i></div>
                        <div>
                            <p class="font-bold">Adresse</p>
                            <p class="text-gray-600 text-sm">Werner-von-Siemens-Straße 2, 64319 Pfungstadt, Deutschland</p>
                        </div>
                    </div>
                    <div class="flex items-start">
                        <div class="bg-green-100 p-3 rounded-full mr-4 text-green-600"><i class="fab fa-whatsapp"></i></div>
                        <div>
                            <p class="font-bold">WhatsApp</p>
                            <p class="text-gray-600 text-sm">+49 1573 8052329</p>
                        </div>
                    </div>
                    <div class="flex items-start">
                        <div class="bg-red-100 p-3 rounded-full mr-4 text-red-600"><i class="fas fa-envelope"></i></div>
                        <div>
                            <p class="font-bold">E-Mail</p>
                            <p class="text-gray-600 text-sm">office@freiraumlogistik.eu</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded shadow-lg">
                <h2 class="text-xl font-bold mb-4" data-key="form-h">Schreiben Sie uns</h2>
                <form action="https://formsubmit.co/office@freiraumlogistik.eu" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    
                    <div class="mb-4">
                        <input type="text" name="name" placeholder="Name" required class="w-full border p-2 rounded">
                    </div>
                    <div class="mb-4">
                        <input type="email" name="email" placeholder="Email" required class="w-full border p-2 rounded">
                    </div>
                    <div class="mb-4">
                        <textarea name="message" placeholder="Nachricht" rows="4" class="w-full border p-2 rounded"></textarea>
                    </div>
                    <button class="w-full bg-blue-900 text-white font-bold py-2 rounded hover:bg-black transition uppercase">Senden</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            'de': { 'title': 'Kontakt', 'subtitle': 'Wir sind für Sie da.', 'form-h': 'Schreiben Sie uns' },
            'en': { 'title': 'Contact Us', 'subtitle': 'We are here for you.', 'form-h': 'Message Us' }
        };
        function setLanguage(lang) {
            document.querySelectorAll('[data-key]').forEach(elem => {
                elem.innerText = translations[lang][elem.getAttribute('data-key')];
            });
        }
    </script>
    <script>
    // Funcția care deschide/închide meniul pe mobil
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        menu.classList.toggle('hidden');
    }

    // Aici rămâne restul codului tău pentru limbi (setLanguage)...
</script>
</body>
</html>
